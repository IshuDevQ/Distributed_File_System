apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfs-api
  namespace: distributed-file-system
  labels:
    app: dfs-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dfs-api
  template:
    metadata:
      labels:
        app: dfs-api
    spec:
      containers:
        - name: dfs-api
          image: ishudevq/distributed-file-system:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: dfs-config

          volumeMounts:
            - name: storage-volume
              mountPath: /app/storage_nodes

            - name: downloads-volume
              mountPath: /app/downloads

            - name: db-volume
              mountPath: /app/db

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: storage-volume
          persistentVolumeClaim:
            claimName: dfs-storage-pvc

        - name: downloads-volume
          persistentVolumeClaim:
            claimName: dfs-downloads-pvc

        - name: db-volume
          persistentVolumeClaim:
            claimName: dfs-db-pvc